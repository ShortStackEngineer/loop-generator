# Offline demo — runs with no API key using the scripted `mock` driver.
# Try it:  loopgen run examples/mock-demo.loop.yaml
#
# The mock driver writes "wrong" on the first iteration (check fails), then "42"
# on the second (check passes) — demonstrating the fail → feedback → fix loop.
#
# Note: `./.workspace` is git-ignored, so git change detection can't see it and
# the runner falls back to driver-reported file changes (you'll see "N file(s)"
# but no diff-stat). Point a loop at a normal, tracked directory to get the full
# git diff + no-op detection.
version: 1
name: mock-demo
description: Demonstrates the feedback loop end-to-end without any external agent.
task:
  type: function
stack:
  language: text
workspace:
  dir: ./.workspace
requirements: |
  Write the string "42" into answer.txt at the workspace root.
driver:
  uses: mock
  options:
    steps:
      - files:
          answer.txt: wrong
        summary: first attempt (intentionally wrong)
      - files:
          answer.txt: "42"
        summary: corrected after feedback
evaluators:
  - uses: command
    as: answer-check
    options:
      command: test "$(cat answer.txt)" = "42"
success:
  type: all-pass
limits:
  maxIterations: 5
